//  TAB EXAMENS
// ═══════════════════════════════════════════
const EX_INIT={eleve_id:'',type:'code',date_examen:'',tentative_numero:1,resultat:'en_attente',notes:''};

function TabExamens({examens,setExamens,eleves,addToast,setSyncing,setSyncErr,isMobile}){
  const[modal,setModal]=useState({open:false,mode:'add',item:null});
  const[form,setForm]=useState(EX_INIT);
  const[loading,setLoading]=useState(false);
  const[confirm,setConfirm]=useState({open:false,id:null});
  const[fRes,setFRes]=useState('');
  const upd=(k,v)=>setForm(f=>({...f,[k]:v}));

  const filtered=useMemo(()=>fRes?examens.filter(e=>e.resultat===fRes):examens,[examens,fRes]);
  const sorted=[...filtered].sort((a,b)=>new Date(a.date_examen)-new Date(b.date_examen));

  const openAdd=()=>{setForm(EX_INIT);setModal({open:true,mode:'add',item:null});};
  const openEdit=(item)=>{setForm({...EX_INIT,...item,tentative_numero:item.tentative_numero||1});setModal({open:true,mode:'edit',item});};

  const handleSubmit=async()=>{
    if(!form.eleve_id||!form.date_examen){addToast('Élève et date sont requis.','error');return;}
    setLoading(true);setSyncing(true);setSyncErr(false);
    try{
      if(modal.mode==='add'){const d=await SB.insert('examens',form);setExamens(p=>[d,...p]);addToast('✅ Examen ajouté !');}
      else{const d=await SB.update('examens',modal.item.id,form);setExamens(p=>p.map(e=>e.id===d.id?d:e));addToast('✅ Examen mis à jour !');}
      setModal({open:false,mode:'add',item:null});
    }catch{setSyncErr(true);addToast('❌ Erreur Supabase.','error');}
    finally{setLoading(false);setSyncing(false);}
  };

  const handleDelete=async()=>{
    if(!confirm.id)return;
    try{await SB.remove('examens',confirm.id);setExamens(p=>p.filter(e=>e.id!==confirm.id));addToast('🗑️ Examen supprimé.');}
    catch{addToast('❌ Erreur.','error');}
    finally{setConfirm({open:false,id:null});}
  };

  const quickResult=async(item,resultat)=>{
    setSyncing(true);setSyncErr(false);
    try{
      const d=await SB.update('examens',item.id,{resultat});
      setExamens(p=>p.map(e=>e.id===d.id?d:e));
      addToast(resultat==='recu'?'✅ Résultat : Reçu !':'❌ Résultat : Recalé');
    }catch{setSyncErr(true);addToast('❌ Erreur.','error');}
    finally{setSyncing(false);}
  };

  const getEleve=(id)=>eleves.find(e=>e.id===id);
  const today=new Date().toISOString().split('T')[0];

  return <div className="fade-up">
    <Confirm open={confirm.open} msg="Supprimer cet examen ?" onOk={handleDelete} onCancel={()=>setConfirm({open:false,id:null})}/>
    <div style={{display:'flex',gap:10,marginBottom:16,flexWrap:'wrap',alignItems:'center'}}>
      <div style={{display:'flex',gap:6,flex:1,flexWrap:'wrap'}}>
        {[['','Tous'],['en_attente','⏳ En attente'],['recu','✅ Reçus'],['recale','❌ Recalés']].map(([v,l])=>(
          <button key={v} onClick={()=>setFRes(v)} style={{background:fRes===v?'var(--green)':'var(--bg3)',color:fRes===v?'#fff':'var(--text2)',border:`1px solid ${fRes===v?'var(--green)':'var(--border)'}`,borderRadius:20,padding:'5px 14px',fontSize:12,cursor:'pointer',fontWeight:600,fontFamily:'var(--font)'}}>{l}</button>
        ))}
      </div>
      <BtnPrimary onClick={openAdd} style={{whiteSpace:'nowrap'}}>+ Nouvel examen</BtnPrimary>
    </div>

    <div style={{background:'var(--card-bg)',border:'1px solid var(--card-border)',borderRadius:'var(--r2)',overflow:'hidden'}}>
      <div style={{overflowX:'auto'}}>
        <table style={{width:'100%',borderCollapse:'collapse'}}>
          <thead>
            <tr style={{background:'var(--bg3)'}}>
              {['Élève','Type','Date','J-Jour','Tentative','Résultat','Actions'].map(h=>(
                <th key={h} style={{padding:'10px 14px',textAlign:'left',fontSize:11,color:'var(--text3)',fontWeight:700,letterSpacing:.5,textTransform:'uppercase',borderBottom:'1px solid var(--border)',whiteSpace:'nowrap'}}>{h}</th>
              ))}
            </tr>
          </thead>
          <tbody>
            {sorted.length===0?<tr><td colSpan={7} style={{padding:32,textAlign:'center',color:'var(--text3)'}}>Aucun examen trouvé.</td></tr>
            :sorted.map((ex,i)=>{
              const el=getEleve(ex.eleve_id);
              const days=daysUntil(ex.date_examen);
              const isPast=ex.date_examen<today;
              return <tr key={ex.id} style={{borderBottom:'1px solid var(--border)',background:i%2===0?'transparent':'var(--bg3)30'}}
                onMouseEnter={ev=>ev.currentTarget.style.background='var(--green-dim)'}
                onMouseLeave={ev=>ev.currentTarget.style.background=i%2===0?'transparent':'var(--bg3)30'}>
                <td style={{padding:'10px 14px',fontWeight:600,fontSize:13}}>{el?`${el.prenom} ${el.nom}`:'—'}</td>
                <td style={{padding:'10px 14px'}}><span style={{background:ex.type==='code'?'var(--cyan-dim)':'var(--green-dim)',color:ex.type==='code'?'var(--cyan)':'var(--green)',borderRadius:20,fontSize:11,fontWeight:700,padding:'2px 10px'}}>{ex.type==='code'?'📚 Code':'🚗 Conduite'}</span></td>
                <td style={{padding:'10px 14px',fontSize:12,color:'var(--text2)'}}>{fmtDate(ex.date_examen)}</td>
                <td style={{padding:'10px 14px'}}>
                  {isPast?<span style={{color:'var(--text3)',fontSize:11}}>Passé</span>:
                  <span style={{fontWeight:700,fontSize:12,color:days===0?'var(--red)':days<=3?'var(--orange)':days<=7?'var(--gold)':'var(--green)'}}>
                    {days===0?'AUJOURD\'HUI':days===1?'DEMAIN':`J-${days}`}
                  </span>}
                </td>
                <td style={{padding:'10px 14px',textAlign:'center'}}><span style={{background:'var(--bg3)',borderRadius:20,fontSize:12,fontWeight:700,padding:'2px 10px',color:'var(--text2)'}}>{ex.tentative_numero||1}ᵉ</span></td>
                <td style={{padding:'10px 14px'}}><Pill val={ex.resultat} map={RESULTATS}/></td>
                <td style={{padding:'10px 14px'}}>
                  <div style={{display:'flex',gap:4,flexWrap:'wrap'}}>
                    {ex.resultat==='en_attente'&&<>
                      <button onClick={()=>quickResult(ex,'recu')} style={{background:'var(--green-dim)',color:'var(--green)',border:'none',borderRadius:6,padding:'4px 8px',fontSize:10,cursor:'pointer',fontWeight:700}}>✅ Reçu</button>
                      <button onClick={()=>quickResult(ex,'recale')} style={{background:'var(--red-dim)',color:'var(--red)',border:'none',borderRadius:6,padding:'4px 8px',fontSize:10,cursor:'pointer',fontWeight:700}}>❌ Recalé</button>
                    </>}
                    <button onClick={()=>openEdit(ex)} style={{background:'var(--cyan-dim)',color:'var(--cyan)',border:'none',borderRadius:6,padding:'4px 8px',fontSize:10,cursor:'pointer',fontWeight:600}}>✏️</button>
                    <button onClick={()=>setConfirm({open:true,id:ex.id})} style={{background:'var(--red-dim)',color:'var(--red)',border:'none',borderRadius:6,padding:'4px 8px',fontSize:10,cursor:'pointer',fontWeight:600}}>🗑️</button>
                  </div>
                </td>
              </tr>;
            })}
          </tbody>
        </table>
      </div>
    </div>

    <Modal open={modal.open} onClose={()=>setModal(m=>({...m,open:false}))} title={modal.mode==='add'?'➕ Nouvel examen':'✏️ Modifier l\'examen'}>
      <div style={{display:'flex',flexDirection:'column',gap:14}}>
        <Select2 label="Élève" required value={form.eleve_id} onChange={e=>upd('eleve_id',e.target.value)}>
          <option value="">-- Sélectionner un élève --</option>
          {eleves.map(e=><option key={e.id} value={e.id}>{e.prenom} {e.nom} – Cat. {e.categorie_permis}</option>)}
        </Select2>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:14}}>
          <Select2 label="Type d'examen" value={form.type} onChange={e=>upd('type',e.target.value)}>
            <option value="code">📚 Code</option>
            <option value="conduite">🚗 Conduite</option>
          </Select2>
          <Input label="Date de l'examen" required type="date" value={form.date_examen} onChange={e=>upd('date_examen',e.target.value)}/>
          <Input label="Nᵉ tentative" type="number" min={1} value={form.tentative_numero} onChange={e=>upd('tentative_numero',parseInt(e.target.value)||1)}/>
          <Select2 label="Résultat" value={form.resultat} onChange={e=>upd('resultat',e.target.value)}>
            {Object.entries(RESULTATS).map(([k,v])=><option key={k} value={k}>{v.icon} {v.label}</option>)}
          </Select2>
        </div>
        <div>
          <label style={{display:'block',fontSize:11,color:'var(--text2)',marginBottom:5,fontWeight:600,letterSpacing:.3,textTransform:'uppercase'}}>Notes</label>
          <textarea value={form.notes} onChange={e=>upd('notes',e.target.value)} rows={2} style={{resize:'vertical'}} placeholder="Observations..."/>
        </div>
        <div style={{display:'flex',gap:10,justifyContent:'flex-end',marginTop:6}}>
          <button onClick={()=>setModal(m=>({...m,open:false}))} style={{background:'var(--bg3)',color:'var(--text2)',border:'1px solid var(--border)',borderRadius:'var(--r)',padding:'9px 20px',fontFamily:'var(--font)',fontSize:13}}>Annuler</button>
          <BtnPrimary loading={loading} onClick={handleSubmit}>{modal.mode==='add'?'Ajouter':'Enregistrer'}</BtnPrimary>
        </div>
      </div>
    </Modal>
  </div>;
}

// ═══════════════════════════════════════════
//  TAB PAIEMENTS (ADMIN ONLY)
// ═══════════════════════════════════════════
const PAI_INIT={eleve_id:'',montant_total:0,acompte:0,solde:0,statut:'impaye',notes:''};

function TabPaiements({paiements,setPaiements,eleves,addToast,setSyncing,setSyncErr,isMobile}){
  const[modal,setModal]=useState({open:false,mode:'add',item:null});
  const[form,setForm]=useState(PAI_INIT);
  const[loading,setLoading]=useState(false);
  const[confirm,setConfirm]=useState({open:false,id:null});
  const[fStatut,setFStatut]=useState('');
  const upd=(k,v)=>setForm(f=>{
    const nf={...f,[k]:v};
    if(k==='montant_total'||k==='acompte'){const mt=parseFloat(nf.montant_total)||0;const ac=parseFloat(nf.acompte)||0;nf.solde=Math.max(0,mt-ac);nf.statut=ac===0?'impaye':ac>=mt?'paye':'partiel';}
    return nf;
  });

  const filtered=useMemo(()=>fStatut?paiements.filter(p=>p.statut===fStatut):paiements,[paiements,fStatut]);
  const totalCA=paiements.reduce((s,p)=>s+(parseFloat(p.acompte)||0),0);
  const totalSolde=paiements.reduce((s,p)=>s+(parseFloat(p.solde)||0),0);

  const openAdd=()=>{setForm(PAI_INIT);setModal({open:true,mode:'add',item:null});};
  const openEdit=(item)=>{setForm({...PAI_INIT,...item});setModal({open:true,mode:'edit',item});};

  const handleSubmit=async()=>{
    if(!form.eleve_id){addToast('Veuillez sélectionner un élève.','error');return;}
    setLoading(true);setSyncing(true);setSyncErr(false);
    try{
      if(modal.mode==='add'){const d=await SB.insert('paiements',form);setPaiements(p=>[d,...p]);addToast('✅ Paiement enregistré !');}
      else{const d=await SB.update('paiements',modal.item.id,form);setPaiements(p=>p.map(x=>x.id===d.id?d:x));addToast('✅ Paiement mis à jour !');}
      setModal({open:false,mode:'add',item:null});
    }catch{setSyncErr(true);addToast('❌ Erreur Supabase.','error');}
    finally{setLoading(false);setSyncing(false);}
  };

  const handleDelete=async()=>{
    if(!confirm.id)return;
    try{await SB.remove('paiements',confirm.id);setPaiements(p=>p.filter(x=>x.id!==confirm.id));addToast('🗑️ Paiement supprimé.');}
    catch{addToast('❌ Erreur.','error');}
    finally{setConfirm({open:false,id:null});}
  };

  const getEleve=(id)=>eleves.find(e=>e.id===id);

  return <div className="fade-up">
    <Confirm open={confirm.open} msg="Supprimer ce paiement ?" onOk={handleDelete} onCancel={()=>setConfirm({open:false,id:null})}/>

    {/* Summary */}
    <div style={{display:'grid',gridTemplateColumns:isMobile?'1fr 1fr':'repeat(3,1fr)',gap:14,marginBottom:20}}>
      <StatCard icon="💵" label="Total encaissé" value={fmtMoney(totalCA)} color="var(--green)"/>
      <StatCard icon="⏳" label="Solde restant" value={fmtMoney(totalSolde)} color="var(--red)"/>
      <StatCard icon="📋" label="Fiches paiement" value={paiements.length} color="var(--cyan)"/>
    </div>

    <div style={{display:'flex',gap:10,marginBottom:16,flexWrap:'wrap',alignItems:'center'}}>
      <div style={{display:'flex',gap:6,flex:1,flexWrap:'wrap'}}>
        {[['','Tous'],['paye','✅ Payés'],['partiel','⚠️ Partiels'],['impaye','❌ Impayés']].map(([v,l])=>(
          <button key={v} onClick={()=>setFStatut(v)} style={{background:fStatut===v?'var(--green)':'var(--bg3)',color:fStatut===v?'#fff':'var(--text2)',border:`1px solid ${fStatut===v?'var(--green)':'var(--border)'}`,borderRadius:20,padding:'5px 14px',fontSize:12,cursor:'pointer',fontWeight:600,fontFamily:'var(--font)'}}>{l}</button>
        ))}
      </div>
      <BtnPrimary onClick={openAdd} style={{whiteSpace:'nowrap'}}>+ Nouveau paiement</BtnPrimary>
    </div>

    <div style={{background:'var(--card-bg)',border:'1px solid var(--card-border)',borderRadius:'var(--r2)',overflow:'hidden'}}>
      <div style={{overflowX:'auto'}}>
        <table style={{width:'100%',borderCollapse:'collapse'}}>
          <thead>
            <tr style={{background:'var(--bg3)'}}>
              {['Élève','Montant total','Acompte versé','Solde restant','Statut','Actions'].map(h=>(
                <th key={h} style={{padding:'10px 14px',textAlign:'left',fontSize:11,color:'var(--text3)',fontWeight:700,letterSpacing:.5,textTransform:'uppercase',borderBottom:'1px solid var(--border)',whiteSpace:'nowrap'}}>{h}</th>
              ))}
            </tr>
          </thead>
          <tbody>
            {filtered.length===0?<tr><td colSpan={6} style={{padding:32,textAlign:'center',color:'var(--text3)'}}>Aucun paiement trouvé.</td></tr>
            :filtered.map((p,i)=>{
              const el=getEleve(p.eleve_id);
              const pct=p.montant_total>0?Math.min(100,Math.round((p.acompte/p.montant_total)*100)):0;
              return <tr key={p.id} style={{borderBottom:'1px solid var(--border)',background:i%2===0?'transparent':'var(--bg3)30'}}
                onMouseEnter={ev=>ev.currentTarget.style.background='var(--green-dim)'}
                onMouseLeave={ev=>ev.currentTarget.style.background=i%2===0?'transparent':'var(--bg3)30'}>
                <td style={{padding:'10px 14px'}}>
                  <div style={{fontWeight:600,fontSize:13}}>{el?`${el.prenom} ${el.nom}`:'—'}</div>
                  <div style={{height:3,background:'var(--border)',borderRadius:2,marginTop:5,width:80}}>
                    <div style={{width:`${pct}%`,height:'100%',background:pct>=100?'var(--green)':pct>=50?'var(--gold)':'var(--red)',borderRadius:2,transition:'width .3s'}}/>
                  </div>
                </td>
                <td style={{padding:'10px 14px',fontWeight:600}}>{fmtMoney(p.montant_total)}</td>
                <td style={{padding:'10px 14px',color:'var(--green)',fontWeight:600}}>{fmtMoney(p.acompte)}</td>
                <td style={{padding:'10px 14px',color:p.solde>0?'var(--red)':'var(--text3)',fontWeight:600}}>{fmtMoney(p.solde)}</td>
                <td style={{padding:'10px 14px'}}><Pill val={p.statut} map={STATUTS_PAI}/></td>
                <td style={{padding:'10px 14px'}}>
                  <div style={{display:'flex',gap:6}}>
                    <button onClick={()=>openEdit(p)} style={{background:'var(--cyan-dim)',color:'var(--cyan)',border:'none',borderRadius:6,padding:'5px 10px',fontSize:11,cursor:'pointer',fontWeight:600}}>✏️</button>
                    <button onClick={()=>setConfirm({open:true,id:p.id})} style={{background:'var(--red-dim)',color:'var(--red)',border:'none',borderRadius:6,padding:'5px 10px',fontSize:11,cursor:'pointer',fontWeight:600}}>🗑️</button>
                  </div>
                </td>
              </tr>;
            })}
          </tbody>
        </table>
      </div>
    </div>

    <Modal open={modal.open} onClose={()=>setModal(m=>({...m,open:false}))} title={modal.mode==='add'?'➕ Nouveau paiement':'✏️ Modifier le paiement'}>
      <div style={{display:'flex',flexDirection:'column',gap:14}}>
        <Select2 label="Élève" required value={form.eleve_id} onChange={e=>upd('eleve_id',e.target.value)}>
          <option value="">-- Sélectionner un élève --</option>
          {eleves.map(e=><option key={e.id} value={e.id}>{e.prenom} {e.nom}</option>)}
        </Select2>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:14}}>
          <Input label="Montant total (FCFA)" type="number" min={0} value={form.montant_total} onChange={e=>upd('montant_total',e.target.value)}/>
          <Input label="Acompte versé (FCFA)" type="number" min={0} value={form.acompte} onChange={e=>upd('acompte',e.target.value)}/>
        </div>
        <div style={{background:'var(--bg3)',borderRadius:'var(--r)',padding:'12px 16px',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
          <span style={{color:'var(--text2)',fontSize:12}}>Solde restant</span>
          <span style={{fontWeight:800,fontSize:16,color:form.solde>0?'var(--red)':'var(--green)'}}>{fmtMoney(form.solde)}</span>
        </div>
        <Select2 label="Statut paiement" value={form.statut} onChange={e=>upd('statut',e.target.value)}>
          {Object.entries(STATUTS_PAI).map(([k,v])=><option key={k} value={k}>{v.icon} {v.label}</option>)}
        </Select2>
        <div>
          <label style={{display:'block',fontSize:11,color:'var(--text2)',marginBottom:5,fontWeight:600,letterSpacing:.3,textTransform:'uppercase'}}>Notes</label>
          <textarea value={form.notes} onChange={e=>upd('notes',e.target.value)} rows={2} style={{resize:'vertical'}} placeholder="Mode de paiement, remarques..."/>
        </div>
        <div style={{display:'flex',gap:10,justifyContent:'flex-end',marginTop:6}}>
          <button onClick={()=>setModal(m=>({...m,open:false}))} style={{background:'var(--bg3)',color:'var(--text2)',border:'1px solid var(--border)',borderRadius:'var(--r)',padding:'9px 20px',fontFamily:'var(--font)',fontSize:13}}>Annuler</button>
          <BtnPrimary loading={loading} onClick={handleSubmit}>{modal.mode==='add'?'Enregistrer':'Mettre à jour'}</BtnPrimary>
        </div>
      </div>
    </Modal>
  </div>;
}

// ═══════════════════════════════════════════
//  TAB ALERTES
// ═══════════════════════════════════════════
function TabAlertes({eleves,examens,paiements,role,setTab}){
  const alertDays=getAlertDays();
  const today=new Date().toISOString().split('T')[0];

  const exProchains=examens.filter(e=>e.resultat==='en_attente'&&daysUntil(e.date_examen)>=0&&daysUntil(e.date_examen)<=alertDays).sort((a,b)=>new Date(a.date_examen)-new Date(b.date_examen));
  const exAujourd=examens.filter(e=>e.resultat==='en_attente'&&e.date_examen===today);
  const impayes=paiements.filter(p=>p.statut==='impaye');
  const partiels=paiements.filter(p=>p.statut==='partiel');
  const prets=eleves.filter(e=>e.statut==='pret_examen');
  const getEleve=(id)=>eleves.find(e=>e.id===id);

  const AlertCard=({icon,title,count,color,bg,children})=>(
    <div style={{background:'var(--card-bg)',border:`1px solid ${color}30`,borderRadius:'var(--r2)',overflow:'hidden',marginBottom:16}}>
      <div style={{padding:'12px 16px',background:`${color}12`,borderBottom:`1px solid ${color}20`,display:'flex',alignItems:'center',gap:10}}>
        <span style={{fontSize:20}}>{icon}</span>
        <span style={{fontFamily:'var(--font-cond)',fontWeight:700,fontSize:15,color}}>{title}</span>
        <span style={{marginLeft:'auto',background:color,color:'#fff',borderRadius:20,fontSize:11,fontWeight:700,padding:'2px 10px'}}>{count}</span>
      </div>
      <div style={{padding:16}}>{children}</div>
    </div>
  );

  return <div className="fade-up">
    {exAujourd.length>0&&<AlertCard icon="🚨" title="EXAMENS AUJOURD'HUI" count={exAujourd.length} color="var(--red)">
      {exAujourd.map(ex=>{const el=getEleve(ex.eleve_id);return <div key={ex.id} style={{padding:'8px 12px',background:'var(--red-dim)',borderRadius:'var(--r)',marginBottom:6,fontSize:13}}>
        <strong>{el?`${el.prenom} ${el.nom}`:'—'}</strong> — {ex.type==='code'?'Code':'Conduite'} (tentative n°{ex.tentative_numero||1})
      </div>;})}
    </AlertCard>}

    {exProchains.length>0&&<AlertCard icon="📅" title={`EXAMENS DANS LES ${alertDays} PROCHAINS JOURS`} count={exProchains.length} color="var(--gold)">
      <div style={{display:'flex',flexDirection:'column',gap:6}}>
        {exProchains.map(ex=>{const el=getEleve(ex.eleve_id);const days=daysUntil(ex.date_examen);return <div key={ex.id} style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'8px 12px',background:'var(--bg3)',borderRadius:'var(--r)',fontSize:12}}>
          <div><strong>{el?`${el.prenom} ${el.nom}`:'—'}</strong> — {ex.type==='code'?'📚 Code':'🚗 Conduite'}</div>
          <div style={{display:'flex',gap:8,alignItems:'center'}}>
            <span style={{fontSize:11,color:'var(--text3)'}}>{fmtDate(ex.date_examen)}</span>
            <span style={{fontWeight:700,color:days===0?'var(--red)':days<=3?'var(--orange)':'var(--gold)'}}>{days===0?'AUJOURD\'HUI':days===1?'DEMAIN':`J-${days}`}</span>
          </div>
        </div>;})}
      </div>
    </AlertCard>}

    {prets.length>0&&<AlertCard icon="🏁" title="ÉLÈVES PRÊTS POUR L'EXAMEN" count={prets.length} color="var(--violet)">
      <div style={{display:'flex',flexWrap:'wrap',gap:8}}>
        {prets.map(e=><div key={e.id} style={{padding:'6px 12px',background:'var(--violet-dim)',color:'var(--violet)',borderRadius:'var(--r)',fontSize:12,fontWeight:600}}>{e.prenom} {e.nom} — Cat. {e.categorie_permis}</div>)}
      </div>
    </AlertCard>}

    {role==='directeur'&&impayes.length>0&&<AlertCard icon="❌" title="PAIEMENTS IMPAYÉS" count={impayes.length} color="var(--red)">
      <div style={{display:'flex',flexDirection:'column',gap:6}}>
        {impayes.map(p=>{const el=getEleve(p.eleve_id);return <div key={p.id} style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'8px 12px',background:'var(--bg3)',borderRadius:'var(--r)',fontSize:12}}>
          <strong>{el?`${el.prenom} ${el.nom}`:'—'}</strong>
          <span style={{color:'var(--red)',fontWeight:700}}>{fmtMoney(p.montant_total)} dû</span>
        </div>;})}
      </div>
    </AlertCard>}

    {role==='directeur'&&partiels.length>0&&<AlertCard icon="⚠️" title="PAIEMENTS PARTIELS" count={partiels.length} color="var(--gold)">
      <div style={{display:'flex',flexDirection:'column',gap:6}}>
        {partiels.map(p=>{const el=getEleve(p.eleve_id);return <div key={p.id} style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'8px 12px',background:'var(--bg3)',borderRadius:'var(--r)',fontSize:12}}>
          <strong>{el?`${el.prenom} ${el.nom}`:'—'}</strong>
          <span style={{color:'var(--gold)',fontWeight:700}}>Solde: {fmtMoney(p.solde)}</span>
        </div>;})}
      </div>
    </AlertCard>}

    {exProchains.length===0&&prets.length===0&&(role!=='directeur'||(!impayes.length&&!partiels.length))&&!exAujourd.length&&(
      <div style={{textAlign:'center',padding:60,color:'var(--text3)'}}>
        <div style={{fontSize:48,marginBottom:16}}>✅</div>
        <div style={{fontFamily:'var(--font-cond)',fontSize:18,fontWeight:700}}>Tout est en ordre !</div>
        <div style={{fontSize:13,marginTop:8}}>Aucune alerte pour le moment.</div>
      </div>
    )}
  </div>;
}

// ═══════════════════════════════════════════
//  TAB PARAMETRES (ADMIN ONLY)
// ═══════════════════════════════════════════
function TabParametres({addToast,theme,setTheme,onDisconnect}){
  const creds=getCreds()||{u:'',k:''};
  const[url,setUrl]=useState(creds.u||'');
  const[key,setKey]=useState(creds.k||'');
  const[days,setDays]=useState(getAlertDays());
  const[showSQL,setShowSQL]=useState(false);
  const[copied,setCopied]=useState(false);

  const saveParams=()=>{
    saveAlertDays(days);
    if(url.trim()&&key.trim()){saveCreds(url.trim(),key.trim());SB.init(url.trim(),key.trim());}
    addToast('✅ Paramètres sauvegardés !');
  };

  const copySQL=()=>{navigator.clipboard.writeText(SQL_SCRIPT).then(()=>{setCopied(true);setTimeout(()=>setCopied(false),2000);});};

  return <div className="fade-up" style={{maxWidth:680}}>
    {/* Theme */}
    <div style={{background:'var(--card-bg)',border:'1px solid var(--card-border)',borderRadius:'var(--r2)',padding:20,marginBottom:16}}>
      <div style={{fontFamily:'var(--font-cond)',fontWeight:700,fontSize:15,marginBottom:14}}>🎨 APPARENCE</div>
      <div style={{display:'flex',gap:12}}>
        {[['dark','🌙 Mode Sombre'],['light','☀️ Mode Clair']].map(([v,l])=>(
          <button key={v} onClick={()=>{setTheme(v);saveTheme(v);document.documentElement.setAttribute('data-theme',v);}} style={{flex:1,background:theme===v?'var(--green)':'var(--bg3)',color:theme===v?'#fff':'var(--text2)',border:`1px solid ${theme===v?'var(--green)':'var(--border)'}`,borderRadius:'var(--r)',padding:'10px',fontFamily:'var(--font)',fontSize:13,cursor:'pointer',fontWeight:theme===v?700:400}}>{l}</button>
        ))}
      </div>
    </div>

    {/* Supabase config */}
    <div style={{background:'var(--card-bg)',border:'1px solid var(--card-border)',borderRadius:'var(--r2)',padding:20,marginBottom:16}}>
      <div style={{fontFamily:'var(--font-cond)',fontWeight:700,fontSize:15,marginBottom:14}}>🔗 CONFIGURATION SUPABASE</div>
      <div style={{display:'flex',flexDirection:'column',gap:12}}>
        <Input label="URL Supabase" value={url} onChange={e=>setUrl(e.target.value)} placeholder="https://xxxx.supabase.co"/>
        <Input label="Clé publique (anon key)" value={key} onChange={e=>setKey(e.target.value)} type="password" placeholder="eyJhbGci..."/>
      </div>
    </div>

    {/* Alertes config */}
    <div style={{background:'var(--card-bg)',border:'1px solid var(--card-border)',borderRadius:'var(--r2)',padding:20,marginBottom:16}}>
      <div style={{fontFamily:'var(--font-cond)',fontWeight:700,fontSize:15,marginBottom:14}}>🔔 ALERTES</div>
      <div style={{display:'flex',alignItems:'center',gap:14}}>
        <label style={{fontSize:13,color:'var(--text2)',flex:1}}>Alerter pour les examens dans les prochains</label>
        <div style={{display:'flex',alignItems:'center',gap:8}}>
          <input type="number" min={1} max={30} value={days} onChange={e=>setDays(parseInt(e.target.value)||7)} style={{width:70,textAlign:'center'}}/>
          <span style={{fontSize:13,color:'var(--text2)'}}>jours</span>
        </div>
      </div>
    </div>

    {/* SQL Script */}
    <div style={{background:'var(--card-bg)',border:'1px solid var(--card-border)',borderRadius:'var(--r2)',padding:20,marginBottom:16}}>
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:8}}>
        <div style={{fontFamily:'var(--font-cond)',fontWeight:700,fontSize:15}}>🗄️ SCRIPT SQL SUPABASE</div>
        <div style={{display:'flex',gap:8}}>
          <button onClick={copySQL} style={{background:copied?'var(--green-dim)':'var(--bg3)',color:copied?'var(--green)':'var(--text2)',border:'1px solid var(--border)',borderRadius:'var(--r)',padding:'5px 12px',fontSize:11,cursor:'pointer',fontFamily:'var(--font)',fontWeight:600}}>{copied?'✅ Copié !':'📋 Copier'}</button>
          <button onClick={()=>setShowSQL(!showSQL)} style={{background:'var(--bg3)',color:'var(--text2)',border:'1px solid var(--border)',borderRadius:'var(--r)',padding:'5px 12px',fontSize:11,cursor:'pointer',fontFamily:'var(--font)',fontWeight:600}}>{showSQL?'Masquer':'Afficher'}</button>
        </div>
      </div>
      <p style={{fontSize:12,color:'var(--text3)',marginBottom:8}}>Exécutez ce script dans votre SQL Editor Supabase pour créer toutes les tables nécessaires.</p>
      {showSQL&&<pre style={{background:'var(--bg)',borderRadius:'var(--r)',padding:12,fontSize:11,overflowX:'auto',color:'var(--green)',fontFamily:'monospace',maxHeight:200,overflowY:'auto',lineHeight:1.5}}>{SQL_SCRIPT}</pre>}
    </div>

    <div style={{display:'flex',gap:10,justifyContent:'space-between',flexWrap:'wrap'}}>
      <button onClick={()=>{if(window.confirm('Déconnecter et effacer les identifiants ?')){clearCreds();localStorage.removeItem(ROLE_KEY);window.location.reload();}}} style={{background:'var(--red-dim)',color:'var(--red)',border:'1px solid var(--red)30',borderRadius:'var(--r)',padding:'9px 18px',fontFamily:'var(--font)',fontSize:13,cursor:'pointer',fontWeight:600}}>🔌 Se déconnecter</button>
      <BtnPrimary onClick={saveParams}>💾 Sauvegarder</BtnPrimary>
    </div>
  </div>;
}

// ═══════════════════════════════════════════
//  APP
// ═══════════════════════════════════════════
function App(){
  const[phase,setPhase]=useState('init');
  const[role,setRole]=useState(null);
  const[tab,setTab]=useState('dashboard');
  const[theme,setTheme]=useState(getTheme());
  const[isMobile,setIsMobile]=useState(window.innerWidth<768);
  const[sideOpen,setSideOpen]=useState(window.innerWidth>=768);
  const[menuOpen,setMenuOpen]=useState(false);
  const[syncing,setSyncing]=useState(false);
  const[syncErr,setSyncErr]=useState(false);
  const[toasts,setToasts]=useState([]);
  const[eleves,setEleves]=useState([]);
  const[seances,setSeances]=useState([]);
  const[examens,setExamens]=useState([]);
  const[paiements,setPaiements]=useState([]);

  useEffect(()=>{
    document.documentElement.setAttribute('data-theme',getTheme());
    const c=getCreds();
    if(c){SB.init(c.u,c.k);const r=getRole();if(r){setRole(r);setPhase('loading');}else setPhase('role');}
    else setPhase('setup');
    const h=()=>{const m=window.innerWidth<768;setIsMobile(m);if(m){setSideOpen(false);setMenuOpen(false);}};
    window.addEventListener('resize',h);return()=>window.removeEventListener('resize',h);
  },[]);

  useEffect(()=>{
    if(phase!=='loading')return;
    Promise.all([SB.getAll('eleves'),SB.getAll('seances'),SB.getAll('examens'),SB.getAll('paiements')])
      .then(([el,se,ex,pa])=>{setEleves(el);setSeances(se);setExamens(ex);setPaiements(pa);setPhase('app');})
      .catch(()=>{addToast('❌ Erreur Supabase. Vérifiez vos clés.','error');setPhase('setup');});
  },[phase]);

  const addToast=(msg,type='success')=>{const id=uid();setToasts(t=>[...t,{id,msg,type}]);setTimeout(()=>setToasts(t=>t.filter(x=>x.id!==id)),3500);};

  const refreshData=async()=>{
    setSyncing(true);setSyncErr(false);
    try{
      const[el,se,ex,pa]=await Promise.all([SB.getAll('eleves'),SB.getAll('seances'),SB.getAll('examens'),SB.getAll('paiements')]);
      setEleves(el);setSeances(se);setExamens(ex);setPaiements(pa);
      addToast('🔄 Données actualisées');
    }catch{setSyncErr(true);addToast('❌ Erreur de synchronisation.','error');}
    finally{setTimeout(()=>setSyncing(false),700);}
  };

  if(phase==='init')return null;
  if(phase==='setup')return <SetupScreen onConnected={()=>{const r=getRole();if(r){setRole(r);setPhase('loading');}else setPhase('role');}}/>;
  if(phase==='role')return <RoleScreen onRole={(r)=>{setRole(r);saveRole(r);setPhase('loading');}}/>;
  if(phase==='loading')return <div style={{height:'100vh',display:'flex',alignItems:'center',justifyContent:'center',flexDirection:'column',gap:16,background:'var(--bg)'}}>
    <span className="spin" style={{fontSize:40,color:'var(--green)'}}>↻</span>
    <div style={{fontFamily:'var(--font-cond)',fontSize:16,color:'var(--text3)',letterSpacing:1}}>Chargement des données...</div>
  </div>;

  const alertCount=()=>{
    const alertDays=getAlertDays();
    const today=new Date().toISOString().split('T')[0];
    let n=examens.filter(e=>e.resultat==='en_attente'&&daysUntil(e.date_examen)>=0&&daysUntil(e.date_examen)<=alertDays).length;
    n+=eleves.filter(e=>e.statut==='pret_examen').length;
    if(role==='directeur')n+=paiements.filter(p=>p.statut==='impaye'||p.statut==='partiel').length;
    return n||null;
  };

  const TABS=[
    {id:'dashboard',label:'Vue Générale',icon:'📊'},
    {id:'eleves',label:'Élèves',icon:'🎓'},
    {id:'planning',label:'Planning',icon:'📅'},
    {id:'examens',label:'Examens',icon:'🏁'},
    ...(role==='directeur'?[{id:'paiements',label:'Paiements',icon:'💰',badge:paiements.filter(p=>p.statut==='impaye').length||null,badgeColor:'var(--red)'}]:[]),
    {id:'alertes',label:'Alertes',icon:'🔔',badge:alertCount(),badgeColor:'var(--orange)'},
    ...(role==='directeur'?[{id:'parametres',label:'Paramètres',icon:'⚙️'}]:[]),
  ];

  const tabLabel=TABS.find(t=>t.id===tab)?.label||'';
  const tabIcon=TABS.find(t=>t.id===tab)?.icon||'';

  return <div style={{display:'flex',height:'100vh',background:'var(--bg)',overflow:'hidden'}}>
    <Toast toasts={toasts}/>

    {/* Mobile overlay */}
    {isMobile&&menuOpen&&<div onClick={()=>setMenuOpen(false)} style={{position:'fixed',inset:0,background:'#000a',zIndex:400}}/>}

    {/* SIDEBAR */}
    <div style={{width:sideOpen?230:60,background:'var(--bg2)',borderRight:'1px solid var(--border)',display:'flex',flexDirection:'column',transition:'width .2s ease',overflow:'hidden',flexShrink:0,position:isMobile?'fixed':'relative',zIndex:isMobile?500:1,height:'100vh',left:0,top:0,transform:isMobile&&!menuOpen?'translateX(-100%)':'translateX(0)'}}>
      {/* Logo */}
      <div style={{padding:sideOpen?'18px 16px 14px':'14px 0',borderBottom:'1px solid var(--border)',textAlign:sideOpen?'left':'center',flexShrink:0}}>
        {sideOpen?(
          <div>
            <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:6}}>
              <div style={{width:36,height:36,borderRadius:'50%',overflow:'hidden',flexShrink:0,background:'var(--bg3)',border:'2px solid var(--green)'}}>

              </div>
              <div>
                <div style={{fontFamily:'var(--font-cond)',fontWeight:900,fontSize:15,letterSpacing:.5}}>LE PATRON</div>
                <div style={{fontSize:10,color:'var(--green)',fontWeight:600,letterSpacing:1}}>AUTO-ÉCOLE</div>
              </div>
            </div>
            <div style={{display:'flex',alignItems:'center',gap:6}}>
              <span className="live"/>
              <span style={{fontSize:10,color:'var(--text3)'}}>{role==='directeur'?'👔 Directeur':'👨‍🏫 Moniteur'}</span>
            </div>
          </div>
        ):<div style={{fontFamily:'var(--font-cond)',fontWeight:900,fontSize:17,color:'var(--green)'}}>LP</div>}
      </div>

      {/* Nav */}
      <nav style={{flex:1,padding:'10px 6px',overflowY:'auto'}}>
        {TABS.map(t=>{
          const active=tab===t.id;
          return <div key={t.id} onClick={()=>{setTab(t.id);if(isMobile){setMenuOpen(false);}}}
            style={{display:'flex',alignItems:'center',gap:10,padding:sideOpen?'10px 14px':'10px 0',justifyContent:sideOpen?'flex-start':'center',cursor:'pointer',borderRadius:'var(--r)',margin:'2px 2px',background:active?'var(--green-dim)':'transparent',color:active?'var(--green)':'var(--text3)',fontWeight:active?700:400,borderLeft:active&&sideOpen?'3px solid var(--green)':'3px solid transparent',transition:'all .15s',whiteSpace:'nowrap'}}
            onMouseEnter={e=>{if(!active)e.currentTarget.style.background='var(--bg3)';}}
            onMouseLeave={e=>{if(!active)e.currentTarget.style.background='transparent';}}>
            <span style={{fontSize:16,flexShrink:0}}>{t.icon}</span>
            {sideOpen&&<span style={{fontSize:13,flex:1}}>{t.label}</span>}
            {sideOpen&&t.badge&&<span style={{background:t.badgeColor||'var(--red)',color:'#fff',borderRadius:10,fontSize:10,fontWeight:700,padding:'1px 6px'}}>{t.badge}</span>}
          </div>;
        })}
        {/* Return to role selection */}
        <div onClick={()=>{setPhase('role');if(isMobile){setMenuOpen(false);}}}
          style={{display:'flex',alignItems:'center',gap:10,padding:sideOpen?'10px 14px':'10px 0',justifyContent:sideOpen?'flex-start':'center',cursor:'pointer',borderRadius:'var(--r)',margin:'2px 2px',background:'transparent',color:'var(--text3)',fontWeight:400,transition:'all .15s',whiteSpace:'nowrap'}}
          onMouseEnter={e=>e.currentTarget.style.background='var(--bg3)'}
          onMouseLeave={e=>e.currentTarget.style.background='transparent'}>
          <span style={{fontSize:16,flexShrink:0}}>🔙</span>
          {sideOpen&&<span style={{fontSize:13,flex:1}}>Retour à la page de choix</span>}
        </div>
      </nav>

      {/* Collapse btn */}
      <div style={{padding:'8px 6px',borderTop:'1px solid var(--border)',flexShrink:0}}>
        <div onClick={()=>setSideOpen(!sideOpen)} style={{display:'flex',alignItems:'center',gap:8,padding:'8px 14px',cursor:'pointer',color:'var(--text3)',borderRadius:'var(--r)',justifyContent:sideOpen?'flex-start':'center',transition:'background .15s'}}
          onMouseEnter={e=>e.currentTarget.style.background='var(--bg3)'} onMouseLeave={e=>e.currentTarget.style.background='transparent'}>
          <span style={{fontSize:12}}>{sideOpen?'◀':'▶'}</span>
          {sideOpen&&<span style={{fontSize:11}}>Réduire</span>}
        </div>
      </div>
    </div>

    {/* MAIN */}
    <div style={{flex:1,display:'flex',flexDirection:'column',overflow:'hidden'}}>
      {/* TopBar */}
      <div style={{padding:isMobile?'8px 12px':'12px 24px',borderBottom:'1px solid var(--border)',display:'flex',alignItems:'center',justifyContent:'space-between',background:'var(--bg2)',flexShrink:0,gap:10,flexWrap:isMobile?'wrap':'nowrap'}}>
        <div style={{display:'flex',alignItems:'center',gap:10}}>
          {isMobile&&<button onClick={()=>setMenuOpen(!menuOpen)} style={{background:'var(--bg3)',color:'var(--text)',border:'1px solid var(--border)',borderRadius:'var(--r)',padding:'6px 10px',cursor:'pointer',fontSize:16}}>☰</button>}
          <span style={{fontFamily:'var(--font-cond)',fontSize:isMobile?14:18,fontWeight:700,letterSpacing:.3}}>{tabIcon} {tabLabel}</span>
        </div>
        <div style={{display:'flex',gap:8,alignItems:'center',flexWrap:'wrap'}}>
          <SyncDot syncing={syncing} err={syncErr} onRefresh={refreshData}/>
          <button onClick={refreshData} disabled={syncing} style={{background:'var(--bg3)',color:'var(--text2)',border:'1px solid var(--border)',borderRadius:'var(--r)',padding:'5px 10px',fontSize:11,cursor:'pointer',opacity:syncing?.5:1}} title="Relancer la synchronisation">🔄 Relancer</button>
          {!isMobile&&<span style={{fontSize:11,color:'var(--text3)'}}>{eleves.length} élèves · {new Date().toLocaleDateString('fr-FR',{weekday:'short',day:'numeric',month:'short'})}</span>}
          <button onClick={()=>{const t=theme==='dark'?'light':'dark';setTheme(t);saveTheme(t);document.documentElement.setAttribute('data-theme',t);}} style={{background:'var(--bg3)',color:'var(--text2)',border:'1px solid var(--border)',borderRadius:'var(--r)',padding:'5px 10px',fontSize:13,cursor:'pointer'}}>
            {theme==='dark'?'☀️':'🌙'}
          </button>
        </div>
      </div>

      {/* Content */}
      <div className="mobile-main" style={{flex:1,overflowY:'auto',overflowX:'hidden',padding:isMobile?10:24}}>
        {tab==='dashboard'&&<TabDashboard eleves={eleves} examens={examens} paiements={paiements} setTab={setTab} isMobile={isMobile} role={role}/>}
        {tab==='eleves'&&<TabEleves eleves={eleves} setEleves={setEleves} addToast={addToast} setSyncing={setSyncing} setSyncErr={setSyncErr} isMobile={isMobile}/>}
        {tab==='planning'&&<TabPlanning seances={seances} setSeances={setSeances} eleves={eleves} addToast={addToast} setSyncing={setSyncing} setSyncErr={setSyncErr} isMobile={isMobile}/>}
        {tab==='examens'&&<TabExamens examens={examens} setExamens={setExamens} eleves={eleves} addToast={addToast} setSyncing={setSyncing} setSyncErr={setSyncErr} isMobile={isMobile}/>}
        {tab==='paiements'&&role==='directeur'&&<TabPaiements paiements={paiements} setPaiements={setPaiements} eleves={eleves} addToast={addToast} setSyncing={setSyncing} setSyncErr={setSyncErr} isMobile={isMobile}/>}
        {tab==='alertes'&&<TabAlertes eleves={eleves} examens={examens} paiements={paiements} role={role} setTab={setTab}/>}
        {tab==='parametres'&&role==='directeur'&&<TabParametres addToast={addToast} theme={theme} setTheme={setTheme}/>}
      </div>
    </div>
  </div>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
